services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      # ⚠️  À REMPLACER: Utiliser .env pour les valeurs sécurisées
      POSTGRES_USER: ${POSTGRES_USER:?error - POSTGRES_USER not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error - POSTGRES_PASSWORD not set}
      POSTGRES_DB: ${POSTGRES_DB:?error - POSTGRES_DB not set}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # 🔒 Sécurité: N'expose pas aux réseaux externes
    networks:
      - nere_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request, sys; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=5); sys.exit(0)'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      # 🔒 SECRETS: Toutes les valeurs doivent venir de .env
      DATABASE_URL: ${DATABASE_URL:?error - DATABASE_URL not set}
      CORS_ORIGINS: ${CORS_ORIGINS:?error - CORS_ORIGINS not set}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?error - ALLOWED_HOSTS not set}
      ENVIRONMENT: ${ENVIRONMENT:?error - ENVIRONMENT not set}
      API_PREFIX: ${API_PREFIX:-/api}
      SECRET_KEY: ${SECRET_KEY:?error - SECRET_KEY not set}
      # Phase 3
      OPENAI_API_KEY: ${OPENAI_API_KEY:?error - OPENAI_API_KEY not set in production}
      STRIPE_API_KEY: ${STRIPE_API_KEY:?error - STRIPE_API_KEY not set in production}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?error - STRIPE_WEBHOOK_SECRET not set}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL}
    ports:
      - "8002:8000"
    networks:
      - nere_network
    # 🔒 Sécurité: Limiter les ressources
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.yourdomain.com}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "443:443"
      - "80:80"
    networks:
      - nere_network
    # 🔒 Sécurité: Limiter les ressources
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  nere_network:
    driver: bridge
    # 🔒 Sécurité: Réseau interne uniquement

volumes:
  db_data:
    driver: local
