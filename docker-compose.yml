services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: nere_user
      POSTGRES_PASSWORD: nere_pass
      POSTGRES_DB: nere_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - "./Documentations NERE/nere_schema.sql:/docker-entrypoint-initdb.d/nere_schema.sql:ro"
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nere_user -d nere_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nere_user:nere_pass@db:5432/nere_db
      CORS_ORIGINS: "http://localhost:4173,http://localhost:5173"
      ENVIRONMENT: development
      API_PREFIX: /api
      SECRET_KEY: change-me
    ports:
      - "8100:8000"

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8100
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  db_data:
