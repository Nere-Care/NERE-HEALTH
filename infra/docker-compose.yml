services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: nere_user
      POSTGRES_PASSWORD: nere_pass
      POSTGRES_DB: nere_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nere_user -d nere_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request, sys; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=5); sys.exit(0)'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      DATABASE_URL: postgresql://nere_user:nere_pass@db:5432/nere_db
      CORS_ORIGINS: "http://localhost:4173,http://localhost:5173"
      ENVIRONMENT: development
      API_PREFIX: /api
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  db_data:
