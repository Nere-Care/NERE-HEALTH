name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Backend CI pipeline
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: nere_user
          POSTGRES_PASSWORD: nere_pass
          POSTGRES_DB: nere_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nere_user -d nere_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nere_user:nere_pass@localhost:5432/nere_db
      API_PREFIX: /api
      ENVIRONMENT: development
      PYTHONDONTWRITEBYTECODE: 1
      PIP_NO_CACHE_DIR: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r backend/requirements.txt
          python -m pip install --no-cache-dir pycodestyle

      - name: Lint backend source
        run: |
          cd backend
          python -m pycodestyle --max-line-length=79 . --exclude=alembic/versions

      - name: Build backend Docker image
        run: |
          docker build --file backend/Dockerfile --tag nere-backend-ci backend

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import time
          import os
          import psycopg2

          url = os.environ['DATABASE_URL']
          for _ in range(30):
              try:
                  conn = psycopg2.connect(url)
                  conn.close()
                  print('PostgreSQL ready')
                  break
              except Exception as exc:
                  print('Waiting for PostgreSQL...', exc)
                  time.sleep(2)
          else:
              raise SystemExit('PostgreSQL did not become available in time')
          PY

      - name: Run Alembic migrations
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests -q
