name: Backend CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Backend CI pipeline
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      DATABASE_URL: postgresql://nere_user:nere_pass@localhost:5432/nere_db
      API_PREFIX: /api
      ENVIRONMENT: development
      PYTHONDONTWRITEBYTECODE: 1
      PIP_NO_CACHE_DIR: 1
      TESTING: 1

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nere_user
          POSTGRES_PASSWORD: nere_pass
          POSTGRES_DB: nere_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r backend/requirements.txt
          python -m pip install --no-cache-dir black pycodestyle

      - name: Format code with black
        run: |
          cd backend
          python -m black . --exclude="alembic/versions" --line-length=120 --check

      - name: Lint backend source
        run: |
          cd backend
          python -m pycodestyle --max-line-length=120 . --exclude=alembic/versions --ignore=E402,W503

      - name: Run Alembic migrations
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests -q
