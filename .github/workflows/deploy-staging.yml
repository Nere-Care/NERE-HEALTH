name: Deploy staging

on:
  push:
    branches:
      - staging
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build and push backend image
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r backend/requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nere-backend:staging
            ghcr.io/${{ github.repository_owner }}/nere-backend:${{ github.sha }}

  deploy:
    name: Deploy to staging host
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy backend image on staging host
        run: |
          ssh -o StrictHostKeyChecking=no -p "${{ secrets.STAGING_SSH_PORT }}" "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "printf '%s' '${{ secrets.STAGING_REGISTRY_PASSWORD }}' | docker login ghcr.io -u '${{ secrets.STAGING_REGISTRY_USERNAME }}' --password-stdin && \
             docker pull ghcr.io/${{ github.repository_owner }}/nere-backend:staging && \
             docker rm -f nere-backend || true && \
             docker run -d --name nere-backend --restart unless-stopped \
               -p 8000:8000 \
               -e DATABASE_URL='${{ secrets.STAGING_DATABASE_URL }}' \
               -e API_PREFIX='${{ secrets.STAGING_API_PREFIX || '/api' }}' \
               -e ENVIRONMENT='staging' \
               -e SECRET_KEY='${{ secrets.STAGING_SECRET_KEY }}' \
               -e CORS_ORIGINS='${{ secrets.STAGING_CORS_ORIGINS || 'http://localhost:4173,http://localhost:5173' }}' \
               ghcr.io/${{ github.repository_owner }}/nere-backend:staging"
