name: Deploy production

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build and push production images
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r backend/requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nere-backend:prod
            ghcr.io/${{ github.repository_owner }}/nere-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nere-backend:${{ github.ref_name }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend/web
          file: frontend/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nere-frontend:prod
            ghcr.io/${{ github.repository_owner }}/nere-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nere-frontend:${{ github.ref_name }}

  deploy:
    name: Deploy production to remote host
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Deploy containers on production host
        run: |
          ssh -o StrictHostKeyChecking=no -p "${{ secrets.PRODUCTION_SSH_PORT }}" "${{ secrets.PRODUCTION_SSH_USER }}@${{ secrets.PRODUCTION_SSH_HOST }}" \
            "printf '%s' '${{ secrets.PRODUCTION_REGISTRY_PASSWORD }}' | docker login ghcr.io -u '${{ secrets.PRODUCTION_REGISTRY_USERNAME }}' --password-stdin && \
             docker pull ghcr.io/${{ github.repository_owner }}/nere-backend:prod && \
             docker pull ghcr.io/${{ github.repository_owner }}/nere-frontend:prod && \
             docker rm -f nere-backend-prod || true && \
             docker rm -f nere-frontend-prod || true && \
             docker run -d --name nere-backend-prod --restart unless-stopped \
               -p 8000:8000 \
               -e DATABASE_URL='${{ secrets.PRODUCTION_DATABASE_URL }}' \
               -e API_PREFIX='${{ secrets.PRODUCTION_API_PREFIX:-/api}}' \
               -e ENVIRONMENT='production' \
               -e SECRET_KEY='${{ secrets.PRODUCTION_SECRET_KEY }}' \
               -e CORS_ORIGINS='${{ secrets.PRODUCTION_CORS_ORIGINS }}' \
               ghcr.io/${{ github.repository_owner }}/nere-backend:prod && \
             docker run -d --name nere-frontend-prod --restart unless-stopped \
               -p 4173:4173 \
               -e VITE_API_URL='${{ secrets.PRODUCTION_FRONTEND_API_URL }}' \
               ghcr.io/${{ github.repository_owner }}/nere-frontend:prod"
