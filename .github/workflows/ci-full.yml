name: Full CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - 'README_SETUP.md'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - 'README_SETUP.md'
      - 'docker-compose.yml'

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      DATABASE_URL: postgresql://nere_user:nere_pass@localhost:5432/nere_db
      API_PREFIX: /api
      ENVIRONMENT: development
      PYTHONDONTWRITEBYTECODE: 1
      PIP_NO_CACHE_DIR: 1
      TESTING: 1

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nere_user
          POSTGRES_PASSWORD: nere_pass
          POSTGRES_DB: nere_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r backend/requirements.txt
          python -m pip install --no-cache-dir black pycodestyle pip-audit

      - name: Format code with black
        run: |
          cd backend
          python -m black . --exclude="alembic/versions" --line-length=120 --check

      - name: Lint backend source
        run: |
          cd backend
          python -m pycodestyle --max-line-length=120 . --exclude=alembic/versions --ignore=E402,W503

      - name: Security scan Python dependencies
        run: |
          python -m pip_audit --fail-on high

      - name: Run Alembic migrations
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests -q

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: |
          cd frontend/web
          npm install

      - name: Run frontend tests
        run: |
          cd frontend/web
          npm test

      # E2E tests not yet configured - uncomment when ready
      # - name: Run frontend E2E tests
      #   run: |
      #     cd frontend/web
      #     npm run test:e2e

      - name: Run frontend security audit
        run: |
          cd frontend/web
          npm audit --audit-level=high

      - name: Build frontend
        run: |
          cd frontend/web
          npm run build

  mobile:
    name: Mobile CI
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install mobile dependencies
        run: |
          cd frontend/mobile
          flutter pub get

      - name: Run mobile unit tests
        run: |
          cd frontend/mobile
          flutter test --exclude-tags=integration

      # Integration tests require emulator/device - use macos-latest or manual testing
      # To enable on macOS, use: runs-on: macos-latest
      # - name: Run mobile integration tests
      #   run: |
      #     cd frontend/mobile
      #     flutter test integration_test

  security-scan:
    name: Security scan image
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scan
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: nere-backend-ci:latest

      - name: Scan backend image with Trivy
        uses: aquasec/trivy-action@v2
        with:
          image-ref: nere-backend-ci:latest
          format: table
          exit-code: 1
